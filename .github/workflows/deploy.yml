name: Deploy to Cloudflare Pages

# Push to main → rebuild with Quartz → redeploy to Cloudflare Pages (Basic Auth).
on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time; cancel superseded runs.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault (content)
        uses: actions/checkout@v4
        with:
          path: vault

      - name: Clone Quartz v4
        run: git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git quartz

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz deps
        working-directory: quartz
        run: npm install

      - name: Write Basic Auth gate (Pages Function)
        run: |
          mkdir -p quartz/functions
          cat > quartz/functions/_middleware.js <<'EOF'
          // AUTOGENERATED — Basic Auth gate for the Tabularium vault.
          // Set BASIC_AUTH_USER / BASIC_AUTH_PASS as environment variables on the Pages project.

          function timingSafeEqual(a, b) {
            if (a.length !== b.length) return false;
            let mismatch = 0;
            for (let i = 0; i < a.length; i++) mismatch |= a.charCodeAt(i) ^ b.charCodeAt(i);
            return mismatch === 0;
          }

          export const onRequest = async (context) => {
            const { request, env, next } = context;

            if (!env.BASIC_AUTH_USER || !env.BASIC_AUTH_PASS) {
              return new Response("Basic Auth not configured (set BASIC_AUTH_USER / BASIC_AUTH_PASS).", {
                status: 500,
              });
            }

            const expected = "Basic " + btoa(`${env.BASIC_AUTH_USER}:${env.BASIC_AUTH_PASS}`);
            const got = request.headers.get("Authorization") || "";

            if (!timingSafeEqual(got, expected)) {
              return new Response("Authentication required.", {
                status: 401,
                headers: { "WWW-Authenticate": 'Basic realm="Tabularium", charset="UTF-8"' },
              });
            }

            return next();
          };
          EOF

      - name: Build site from the vault
        working-directory: quartz
        run: npx quartz build --directory ../vault

      - name: Deploy to Cloudflare Pages
        working-directory: quartz
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy public --project-name tabularium --branch main --commit-dirty=true
